<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Vibe Animation Competition</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Competition Dashboard</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
        </nav>
    </header>

    <main>
        <section id="leaderboard">
            <h2>Leaderboard</h2>
            <div id="leaderboardList"></div>
        </section>

        <section id="scoring">
            <h2>Update Scores</h2>
            <form id="scoringForm">
                <select id="participantSelect" required>
                    <option value="">Select Participant</option>
                </select>
                <input type="number" id="score" placeholder="Score" min="0" max="10" step="0.1" required>
                <button type="submit">Update Score</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Vibe Animation Competition. All rights reserved.</p>
    </footer>

    <script src="app.js"></script>
    <script src="references.js"></script>
</body>
</html>
