services:
  - type: web
    name: srimca-ai-backend
    runtime: python
    buildCommand: cd backend && python -m pip install --upgrade pip && python -m pip install -r requirements.txt && python -m pip install -r srimca/requirements.txt
    startCommand: cd backend && python app.py
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false  # Set this in Render dashboard
      - key: DB_NAME
        value: srimca_ai
